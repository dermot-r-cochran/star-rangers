---
# cPanel Git Version Control deployment configuration.
# Reference: https://docs.cpanel.net/knowledge-base/web-services/guide-to-git-deployment/
#
# This same file is shared by every cPanel repository clone (one clone per
# target domain, each pulling this same branch). Since git content is
# identical across clones, per-domain behavior is selected via a small
# untracked "deploy.conf" file placed manually in each clone's
# $REPOSITORY_ROOT, e.g. for undercover-pets.com (cPanel user "undercov"):
#
#   CPANEL_USER=undercov
#   THEME=pets
#   CHARACTERS=aldera,elvira
#   TOPICS=boundary,detective-agency
#   ADMIN_EMAIL=admin@example.com
#
# All are optional. No deploy.conf, or a missing value, falls back to
# CPANEL_USER=sciencef and THEME=default (the plain build with no CSS swap,
# deployed to /home/sciencef/public_html/ — today's original behavior), no
# content filtering (the full site), and no deployment-log email.
#
# THEME=default uses src/css/main.css as-is. Any other THEME value maps to
# src/css/theme-$THEME.css; if that file doesn't exist in the repo (e.g. a
# typo'd or not-yet-added theme), it falls back to src/css/main.css.
#
# CHARACTERS and TOPICS are comma-separated, case-insensitive lists that
# narrow the deployed site to content related to the listed characters
# and/or topics:
#   - CHARACTERS matches a character page's `id` frontmatter, and a
#     chapter's `povs[].id` list.
#   - TOPICS matches a page's `tags` (and `category`, where present)
#     frontmatter, across every content type including character pages.
#   - CHARACTERS also participates in tag matching (tags conventionally
#     embed character slugs, e.g. a timeline entry tagged "aldera"), so a
#     page is included if it matches CHARACTERS or TOPICS by any of the
#     above.
#   - Excluded pages still build at their normal URL — as a minimal
#     "not included in this edition" placeholder — instead of being
#     omitted, so links to them never 404.
#   - Section index/listing pages (Characters, Lore, Codex, Glossary,
#     Timeline, Seasons/Episodes) and other structural pages always build
#     normally, just listing fewer items.
#   - A chapter's individual per-scene, per-character POV pages (see
#     src/_data/scenePovPages.js and src/scene-pov.njk) apply CHARACTERS at
#     that finer grain: only the listed characters' own scene pages render
#     real content, every other character in that scene still gets a
#     placeholder page at its normal URL. The whole-chapter overview page
#     (all POVs on one page, unchanged) keeps the coarser any-match
#     behavior described above - a chapter renders there if ANY of its POVs
#     or tags match.
# Leaving both unset/empty (the default, and always true for the GitHub
# Pages build) deploys the full, unfiltered site.
#
# ADMIN_EMAIL, if set, receives one email per deployment attempt — success
# or failure — with the full captured build+deploy log as the body and a
# SUCCESS/FAILURE subject line (plus CPANEL_USER and a timestamp, since
# every clone shares this same .cpanel.yml). Sent via local `mail`(1),
# falling back to /usr/sbin/sendmail directly if `mail` isn't installed.
# No default is set here deliberately, so no real address is hardcoded in
# this public repo — each clone that wants notifications sets its own
# ADMIN_EMAIL in its untracked deploy.conf. This is strictly best-effort
# observability: if ADMIN_EMAIL is unset, or neither mail command is
# available, or the send itself fails, the deploy's own success/failure is
# completely unaffected — see scripts/cpanel-deploy.sh.
#
# Independent of ADMIN_EMAIL, every deployment attempt also saves its full
# log locally to deploy-logs/ (untracked/gitignored), one timestamped file
# per attempt, pruned to the most recent 20 runs - so past deploys can be
# inspected on the server without needing email configured at all.
#
# To add a new domain: create a new cPanel repository clone pointed at that
# domain's account, and drop a deploy.conf with its CPANEL_USER (and THEME,
# ADMIN_EMAIL, etc., if needed) into it. No edits to this file are needed
# unless the domain needs a brand-new theme stylesheet (add
# src/css/theme-<name>.css).
#
# NOTE on absolute paths: src/_includes/base.njk hardcodes every internal
# link/asset reference (CSS, JS, nav, home link, license link) with a literal
# "/star-rangers/" prefix, matching this project's GitHub Pages URL
# (dermot-r-cochran.github.io/star-rangers/). Those are plain strings, not
# run through Eleventy's `url` filter, so no Eleventy pathPrefix flag can
# change them - an earlier version of this file passed `--pathprefix=/` here
# under that assumption, but it was a no-op (and Eleventy's default
# pathPrefix is already "/" anyway). Since cPanel deploys serve each domain
# from its root (not a "/star-rangers/" subpath), scripts/cpanel-deploy.sh
# rewrites that hardcoded prefix out of the built output before it's
# rsynced out.
#
# NOTE on rsync exclusions: scripts/cpanel-deploy.sh's rsync excludes
# .well-known/acme-challenge/, cPanel's AutoSSL/Let's Encrypt domain-
# validation directory. It's never part of the Eleventy build, so without
# the exclude, --delete-delay would remove it (and any in-progress
# certificate challenge) on every deploy.
#
# NOTE on single-task structure: cPanel aborts every remaining task in this
# list the instant one exits non-zero. A multi-task list (as this file used
# to be) therefore can't guarantee any "always run this at the end"
# behavior — a failure partway through the build would just stop silently,
# leaving only cPanel's own UI log as a record. Deployment logic is
# consolidated into a single task invoking scripts/cpanel-deploy.sh so that
# script can use its own internal control flow (see its header comment) to
# guarantee the ADMIN_EMAIL notification above still fires on any failure,
# at any step, not just on full success.

deployment:
  tasks:
    # Runs the full build+deploy sequence (ensure-node, npm ci, eleventy
    # build w/ CHARACTERS/TOPICS, _site sanity check, /star-rangers/ prefix
    # rewrite, theme selection + rsync deploy + verification) and, always,
    # the ADMIN_EMAIL notification - see scripts/cpanel-deploy.sh for the
    # full sequence and comments. Invoked via an explicit `bash` interpreter
    # (not `sh`, and not relying on the executable bit) because the script
    # uses bash-only features (${PIPESTATUS[0]}) to make full-log capture +
    # live cPanel UI output + accurate exit-code detection reliable - see
    # that script's header comment for the tradeoff discussion.
    #
    # No `$REPOSITORY_ROOT` here at all, deliberately, after two live-deploy
    # failures traced to it. cPanel already runs every task with cwd set to
    # the repo checkout (the standard, documented behavior every .cpanel.yml
    # example relies on for its own bare relative paths), so `scripts/...`
    # below needs no path variable to find the script. That sidesteps the
    # whole failure class: cPanel does its own `$REPOSITORY_ROOT` token
    # substitution outside of any real shell, and it turns out to be
    # quote-aware like a real shell's substitution would be (it skips the
    # token when it's nested inside single quotes) - so getting it to
    # resolve correctly at every nesting depth needed for the redirect fix
    # below kept breaking in new ways across two separate live deploys (see
    # git history on this file for both incidents). A relative path has no
    # such token to substitute in the first place.
    #
    # `2>>"${HOME:-/tmp}/..."` below covers the one failure class
    # scripts/cpanel-deploy.sh's own log/email capture structurally cannot:
    # this task line failing before the script ever starts running (e.g.
    # the script file going missing or unreadable). That's un-capturable by
    # the script's own logic no matter how this line is phrased, since
    # nothing inside the script has executed yet - so it's redirected
    # straight to a file under $HOME, independent of the repo checkout.
    # Anything reaching cPanel's own deployment UI still shows up there
    # too; this just keeps a persistent copy that doesn't disappear once
    # that UI view is gone. A plain `2>>` redirect (no trailing `;`/pipe)
    # doesn't touch $?, so cPanel still sees bash's real exit code for
    # deploy success/failure.
    #
    # That redirect and `$HOME` expansion need a real shell to parse them -
    # cPanel's own task exec doesn't provide one (confirmed via a live
    # deploy: both were silently inert with no wrapper at all) - hence the
    # explicit `bash -c '...'` wrapper. Since nothing inside that wrapper
    # references `$REPOSITORY_ROOT` anymore, the whole thing can stay
    # single-quoted with no risk of cPanel's substitution reaching in and
    # interfering with it.
    - bash -c 'bash "scripts/cpanel-deploy.sh" 2>>"${HOME:-/tmp}/cpanel-deploy-line-errors.log"'
