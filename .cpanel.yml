---
# cPanel Git Version Control deployment configuration.
# Reference: https://docs.cpanel.net/knowledge-base/web-services/guide-to-git-deployment/

deployment:
  tasks:
    # 1) Install deterministic dependencies
    - cd "$REPOSITORY_ROOT" && npm ci --no-audit --no-fund

    # 2) Build Eleventy with root-relative URLs
    - cd "$REPOSITORY_ROOT" && "$REPOSITORY_ROOT/node_modules/.bin/eleventy" --pathprefix=/

    # 3) Safety check: build output must exist
    - test -d "$REPOSITORY_ROOT/_site"

    # 4) Deploy static output to document root
    # --delete-delay is safer than immediate delete during transfer.
    - rsync -av --delete-delay "$REPOSITORY_ROOT/_site/" /home/sciencef/public_html/

    # 5) Post-deploy sanity check: index must exist
    - test -f /home/sciencef/public_html/index.html
