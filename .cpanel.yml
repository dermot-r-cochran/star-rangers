---
# cPanel Git Version Control deployment configuration.
# Reference: https://docs.cpanel.net/knowledge-base/web-services/guide-to-git-deployment/
#
# This same file is shared by every cPanel repository clone (one clone per
# target domain, each pulling this same branch). Since git content is
# identical across clones, per-domain behavior is selected via a small
# untracked "deploy.conf" file placed manually in each clone's
# $REPOSITORY_ROOT, e.g. for undercover-pets.com (cPanel user "undercov"):
#
#   CPANEL_USER=undercov
#   THEME=pets
#   CHARACTERS=aldera,elvira
#   TOPICS=boundary,detective-agency
#
# All are optional. No deploy.conf, or a missing value, falls back to
# CPANEL_USER=sciencef and THEME=default (the plain build with no CSS swap,
# deployed to /home/sciencef/public_html/ — today's original behavior) and
# no content filtering (the full site).
#
# THEME=default uses src/css/main.css as-is. Any other THEME value maps to
# src/css/theme-$THEME.css; if that file doesn't exist in the repo (e.g. a
# typo'd or not-yet-added theme), it falls back to src/css/main.css.
#
# CHARACTERS and TOPICS are comma-separated, case-insensitive lists that
# narrow the deployed site to content related to the listed characters
# and/or topics:
#   - CHARACTERS matches a character page's `id` frontmatter, and a
#     chapter's `povs[].id` list.
#   - TOPICS matches a page's `tags` (and `category`, where present)
#     frontmatter, across every content type including character pages.
#   - CHARACTERS also participates in tag matching (tags conventionally
#     embed character slugs, e.g. a timeline entry tagged "aldera"), so a
#     page is included if it matches CHARACTERS or TOPICS by any of the
#     above.
#   - Excluded pages still build at their normal URL — as a minimal
#     "not included in this edition" placeholder — instead of being
#     omitted, so links to them never 404.
#   - Section index/listing pages (Characters, Lore, Codex, Glossary,
#     Timeline, Seasons/Episodes) and other structural pages always build
#     normally, just listing fewer items.
# Leaving both unset/empty (the default, and always true for the GitHub
# Pages build) deploys the full, unfiltered site.
#
# To add a new domain: create a new cPanel repository clone pointed at that
# domain's account, and drop a deploy.conf with its CPANEL_USER (and THEME,
# if not default) into it. No edits to this file are needed unless the
# domain needs a brand-new theme stylesheet (add src/css/theme-<name>.css).
#
# NOTE on absolute paths: src/_includes/base.njk hardcodes every internal
# link/asset reference (CSS, JS, nav, home link, license link) with a literal
# "/star-rangers/" prefix, matching this project's GitHub Pages URL
# (dermot-r-cochran.github.io/star-rangers/). Those are plain strings, not
# run through Eleventy's `url` filter, so no Eleventy pathPrefix flag can
# change them - an earlier version of this file passed `--pathprefix=/` here
# under that assumption, but it was a no-op (and Eleventy's default
# pathPrefix is already "/" anyway). Since cPanel deploys serve each domain
# from its root (not a "/star-rangers/" subpath), task 4 below rewrites that
# hardcoded prefix out of the built output before it's rsynced out.

deployment:
  tasks:
    # 1) Install deterministic dependencies. scripts/ensure-node.sh downloads a
    #    local Node.js runtime on first run (cached under $HOME, outside the
    #    repo) rather than depending on cPanel's "Setup Node.js App" UI
    #    feature, which isn't available/working on every account.
    - cd "$REPOSITORY_ROOT" && . ./scripts/ensure-node.sh && npm ci --no-audit --no-fund

    # 2) Build Eleventy. Source this clone's deploy.conf here (if present)
    #    and export CHARACTERS/TOPICS before invoking eleventy - each
    #    .cpanel.yml task is a separate shell, so vars exported in one task
    #    do NOT persist to the next (task 5 re-sources deploy.conf itself
    #    for the same reason). CHARACTERS/TOPICS optionally restrict the
    #    built site to related characters/topics; see header comment.
    - >
      cd "$REPOSITORY_ROOT" && . ./scripts/ensure-node.sh &&
      CHARACTERS="";
      TOPICS="";
      test -f "$REPOSITORY_ROOT/deploy.conf" && . "$REPOSITORY_ROOT/deploy.conf";
      export CHARACTERS TOPICS;
      "$REPOSITORY_ROOT/node_modules/.bin/eleventy"

    # 3) Safety check: build output must exist
    - test -d "$REPOSITORY_ROOT/_site"

    # 4) Rewrite the GitHub-Pages-only "/star-rangers/" prefix (hardcoded in
    #    src/_includes/base.njk) to root-relative "/" across the built
    #    output, since cPanel domains are served from their own root, not
    #    from a "/star-rangers/" subpath. See the NOTE above.
    - find "$REPOSITORY_ROOT/_site" -type f \( -name "*.html" -o -name "*.css" -o -name "*.js" \) -exec sed -i 's#/star-rangers/#/#g' {} +

    # 5) Pick this clone's account + theme, apply the theme CSS, deploy, and
    #    verify. --delete-delay is safer than immediate delete during
    #    transfer.
    - >
      CPANEL_USER=sciencef;
      THEME=default;
      test -f "$REPOSITORY_ROOT/deploy.conf" && . "$REPOSITORY_ROOT/deploy.conf";
      DEST="/home/$CPANEL_USER/public_html/";
      SRC_CSS="$REPOSITORY_ROOT/src/css/main.css";
      if [ "$THEME" != "default" ] && [ -f "$REPOSITORY_ROOT/src/css/theme-$THEME.css" ]; then
        SRC_CSS="$REPOSITORY_ROOT/src/css/theme-$THEME.css";
      fi;
      cp "$SRC_CSS" "$REPOSITORY_ROOT/_site/css/main.css" &&
      rsync -av --delete-delay "$REPOSITORY_ROOT/_site/" "$DEST" &&
      test -f "${DEST}index.html"
