name: Deploy to cPanel (WordPress & HumHub)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cpanel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build with Eleventy (root path prefix)
        run: npx eleventy --pathprefix=/

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: _site
          retention-days: 1

  # `vars.WORDPRESS_TARGETS_JSON` should be a JSON array of objects.
  # Example:
  # [
  #   {"domain":"wp1.example.com","server_dir":"/public_html/wp1/"},
  #   {"domain":"wp2.example.com","server_dir":"/public_html/wp2/"}
  # ]
  deploy-wordpress:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(vars.WORDPRESS_TARGETS_JSON) }}
    environment:
      name: wordpress
      url: https://${{ matrix.target.domain }}
    steps:
      - name: Download site artifact
        uses: actions/download-artifact@v4
        with:
          name: site
          path: _site

      - name: Apply WordPress theme
        run: |
          cp _site/css/main.css _site/css/base.css
          cp _site/css/theme-wordpress.css _site/css/main.css

      - name: Deploy to WordPress via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.CPANEL_FTP_HOST }}
          username: ${{ secrets.CPANEL_FTP_USER }}
          password: ${{ secrets.CPANEL_FTP_PASSWORD }}
          local-dir: ./_site/
          server-dir: ${{ matrix.target.server_dir }}

  # `vars.HUMHUB_TARGETS_JSON` should be a JSON array of objects.
  # Example:
  # [
  #   {"domain":"community1.example.com","server_dir":"/public_html/community1/"},
  #   {"domain":"community2.example.com","server_dir":"/public_html/community2/"}
  # ]
  deploy-humhub:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(vars.HUMHUB_TARGETS_JSON) }}
    environment:
      name: humhub
      url: https://${{ matrix.target.domain }}
    steps:
      - name: Download site artifact
        uses: actions/download-artifact@v4
        with:
          name: site
          path: _site

      - name: Apply HumHub theme
        run: |
          cp _site/css/main.css _site/css/base.css
          cp _site/css/theme-hubhub.css _site/css/main.css

      - name: Deploy to HumHub via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.CPANEL_FTP_HOST }}
          username: ${{ secrets.CPANEL_FTP_USER }}
          password: ${{ secrets.CPANEL_FTP_PASSWORD }}
          local-dir: ./_site/
          server-dir: ${{ matrix.target.server_dir }}
