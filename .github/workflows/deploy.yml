name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build with Eleventy
        # GitHub Pages serves under /star-rangers/, unlike the cPanel
        # domains (root-served) that giscus's pathname-mapped comments
        # actually target - leaving comments on here would just create a
        # second, disconnected set of discussions for the same pages.
        run: npm run build
        env:
          COMMENTS_ENABLED: "false"
          # Unset by default (this project's own Pages build keeps the
          # /star-rangers/ prefix it's always used); a fork serving from a
          # different repo name sets a SITE_PATH_PREFIX repository variable
          # (Settings -> Secrets and variables -> Actions -> Variables)
          # instead of editing this file - see .eleventy.js and FORKING.md.
          SITE_PATH_PREFIX: ${{ vars.SITE_PATH_PREFIX }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
