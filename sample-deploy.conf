# Sample deploy.conf - copy this to a real "deploy.conf" in the repository
# root of a cPanel Git Version Control clone, then edit the values for that
# clone's domain. "deploy.conf" itself is untracked (gitignored) since each
# clone's settings are specific to that domain/account - this sample file is
# the only copy tracked in git. See .cpanel.yml's header comment and the
# "cPanel deployment config for local clones" section of README.md for full
# details on each key.
#
#   cp sample-deploy.conf deploy.conf
#
# Every key below is optional; commenting one out (or deleting deploy.conf
# entirely) falls back to the default shown in its comment.

# Destination cPanel account: deploys to /home/<CPANEL_USER>/public_html/.
# Default: sciencef
CPANEL_USER=sciencef

# CSS theme. "default" uses src/css/main.css as-is; any other value maps to
# src/css/theme-<THEME>.css, falling back to main.css if that file doesn't
# exist in the repo. Every theme below is generated from main.css by
# scripts/generate-themes.js (`npm run generate-themes`), which swaps in
# only that theme's palette and keeps everything else byte-for-byte in
# sync with main.css - see that script's THEMES registry to add a new one
# or tweak an existing palette.
#
# Domain re-skins (tied to a specific production domain's branding):
#   fellowship    - warm, luminous gold/parchment palette (fellowshipoflight.org)
#   pets          - warm, friendly orange/cream palette (undercover-pets.com)
#   starquest     - deep-space navy with neon teal accents (starquest.site/.online)
#
# Standard themes (general-purpose, not tied to any domain):
#   light         - light/day mode; the site's only non-dark option
#   high-contrast - maximal-contrast black/white/yellow, for low-vision accessibility
#   sepia         - warm parchment/e-reader tone for long reading sessions
#   solarized     - Ethan Schoonover's Solarized Dark palette
#
# Default: default
THEME=default

# Public domain this clone serves - no scheme, no path, no trailing slash
# (e.g. "undercover-pets.com"). Used to build the absolute URLs that
# robots.txt's Sitemap line and every <loc> in sitemap.xml need; both are
# generated at build time (src/robots.njk, src/sitemap.njk, driven by
# src/_data/site.js) rather than copied as static files, specifically so
# each cPanel clone gets its own correct domain instead of all of them
# sharing one hardcoded host.
# Default: sciencefiction.site
DOMAIN=sciencefiction.site

# Brand name shown in the header logo and footer of the deployed site.
# Default: Star Rangers
#SITE_NAME=Star Rangers

# Text used in every page's browser <title> tag (as the "| <SITE_TITLE>"
# suffix, or standalone on the home page). Kept separate from SITE_NAME so
# a clone can use a different string in the tab title than in its on-page
# branding, if desired - most clones will just want the same value in both.
# Default: Star Rangers
#SITE_TITLE=Star Rangers

# Comma-separated, case-insensitive character id list. When set, narrows
# the deployed site to content related to these characters (character page
# `id`, chapter `povs[].id`, and tag matches). Leave blank/commented for the
# full, unfiltered site.
# Default: (unset - full site)
#CHARACTERS=aldera,elvira

# Comma-separated, case-insensitive topic list. When set, narrows the
# deployed site to content whose `tags`/`category` match. Leave
# blank/commented for the full, unfiltered site.
# Default: (unset - full site)
#TOPICS=boundary,detective-agency

# Comma-separated, case-insensitive storyline thread id list (see
# src/threads/ and lib/storyline-threads.js for the registry - currently
# "founding-era" and "tissadelle-arc"). When set, narrows the deployed site
# to every season that thread covers (all of that season's chapters, plus
# any lore/timeline/glossary/codex entry explicitly tagged with the thread
# id). Combines with CHARACTERS/TOPICS rather than replacing them - a page
# matching any one of the three is included. Leave blank/commented for the
# full, unfiltered site.
# Default: (unset - full site)
#THREADS=tissadelle-arc

# Address to email the full deployment log to after every deploy attempt
# (success or failure). Best-effort only - never blocks the deploy itself.
# If left unset/commented, defaults to admin@<DOMAIN> (using this file's
# DOMAIN setting above), rather than hardcoding a real address in this
# public repo.
# Default: admin@<DOMAIN>
#ADMIN_EMAIL=admin@example.com

# Path to a clone-local, untracked markdown file with valid lore-entry
# front matter (layout: lore-entry.njk, title, category, tags,
# description - see any file under src/lore/ for the shape). If set and
# the file exists, it's copied into src/lore/custom/ before the build, so
# it becomes one extra lore page unique to this clone (builds at
# /lore/custom/<filename-without-extension>/), then removed again once the
# build has read it - never committed to the shared repo. Fails the deploy
# if set but the file can't be found, rather than silently skipping it.
# Default: (unset - no extra lore page)
#CUSTOM_LORE_FILE=/home/undercov/custom-lore/undercover-pets-origin.md

# Path to a clone-local, untracked CSS file. If set and the file exists,
# its contents are appended to the deployed css/main.css after the THEME
# stylesheet, so small clone-specific style tweaks (a color, a font swap)
# don't need a whole new theme-<name>.css living in the shared repo - and
# since it loads last, its rules can override the theme's. Fails the
# deploy if set but the file can't be found, rather than silently skipping
# it.
# Default: (unset - no extra CSS)
#CUSTOM_CSS_FILE=/home/undercov/custom-lore/undercover-pets-tweaks.css

# ---------------------------------------------------------------------------
# Alt domains: deploy additional domains from THIS SAME clone/checkout,
# alongside the primary domain above, instead of needing a separate cPanel
# Git Version Control clone per domain. Each alt domain is a sibling folder
# under this account's $HOME, at the same level as public_html/ (typically
# an addon domain's own document root) - create that folder / point the
# addon domain at it in cPanel first, then list it here.
#
# ALT_DOMAINS is a space-separated list of short ids (letters/digits/
# underscore only, can't start with a digit - these become variable name
# suffixes, not folder names). Every id listed needs its own ALT_<id>_DIR
# and ALT_<id>_DOMAIN below - both required, since (unlike everything
# else) there's no safe default folder or public domain to guess. Every
# other ALT_<id>_* key is optional and defaults exactly the way its
# unprefixed counterpart above does. Leave ALT_DOMAINS unset/commented for
# today's single-domain behavior - nothing here changes unless it's set.
#
# A listed alt domain whose ALT_<id>_DIR folder doesn't exist, or that's
# missing ALT_<id>_DIR/ALT_<id>_DOMAIN, or whose id isn't a valid
# identifier, FAILS that domain loudly (a clear FAIL line + a non-zero
# deploy exit + a notification) rather than silently skipping it - same
# philosophy as CUSTOM_LORE_FILE/CUSTOM_CSS_FILE above. One alt domain
# failing does NOT stop the primary domain, or any other alt domain, from
# still deploying - see scripts/cpanel-deploy.sh's build_and_deploy() for
# details.
#
# Every id below is a placeholder - rename each one (and its ALT_<id>_*
# keys) to whatever's meaningful for the domains actually being added, and
# delete any of the four you don't need. Nothing about the mechanism caps
# the count at four; that's just how many this particular clone happens to
# be adding today.
# Default: (unset - primary domain only)
#ALT_DOMAINS="altsite1 altsite2 altsite3 altsite4"

# --- altsite1: deploys to /home/sciencef/altsite1_html/ --------------------
#ALT_altsite1_DIR=altsite1_html
#ALT_altsite1_DOMAIN=altsite1.example
#ALT_altsite1_THEME=default
#ALT_altsite1_SITE_NAME=Alt Site One
#ALT_altsite1_SITE_TITLE=Alt Site One
#ALT_altsite1_CHARACTERS=aldera,elvira
#ALT_altsite1_TOPICS=boundary,detective-agency
#ALT_altsite1_THREADS=tissadelle-arc
#ALT_altsite1_ADMIN_EMAIL=admin@altsite1.example
#ALT_altsite1_CUSTOM_LORE_FILE=/home/sciencef/custom-lore/altsite1-origin.md
#ALT_altsite1_CUSTOM_CSS_FILE=/home/sciencef/custom-lore/altsite1-tweaks.css

# --- altsite2: deploys to /home/sciencef/altsite2_html/ --------------------
#ALT_altsite2_DIR=altsite2_html
#ALT_altsite2_DOMAIN=altsite2.example
#ALT_altsite2_THEME=default

# --- altsite3: deploys to /home/sciencef/altsite3_html/ --------------------
#ALT_altsite3_DIR=altsite3_html
#ALT_altsite3_DOMAIN=altsite3.example
#ALT_altsite3_THEME=default

# --- altsite4: deploys to /home/sciencef/altsite4_html/ --------------------
#ALT_altsite4_DIR=altsite4_html
#ALT_altsite4_DOMAIN=altsite4.example
#ALT_altsite4_THEME=default
